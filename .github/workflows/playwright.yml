name: QA Test Pyramid

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly mutation test run — every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

# Cancel in-progress runs on the same branch so a new push doesn't queue behind an old one
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Dynamic prioritization ─────────────────────────────────────────
  # Computes --grep pattern from diff so downstream jobs run only at-risk tests.
  # Full suite always runs on push to main.
  prioritize:
    name: Prioritize Tests
    runs-on: ubuntu-latest
    outputs:
      grep: ${{ steps.compute.outputs.grep }}
      full_run: ${{ steps.compute.outputs.full_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compute test priority
        id: compute
        run: |
          pip install -q pydantic requests
          if [ "${{ github.event_name }}" = "push" ] && \
             [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "grep=" >> $GITHUB_OUTPUT
            echo "full_run=true" >> $GITHUB_OUTPUT
          else
            GREP=$(python scripts/prioritize_tests.py --base HEAD~1 2>/dev/null || echo "")
            echo "grep=$GREP" >> $GITHUB_OUTPUT
            echo "full_run=false" >> $GITHUB_OUTPUT
          fi
          python scripts/prioritize_tests.py --json 2>/dev/null >> $GITHUB_STEP_SUMMARY || true

  # ── Job 2: Playwright test pyramid ────────────────────────────────────────
  playwright:
    name: Playwright — ${{ matrix.suite }}
    runs-on: ubuntu-latest
    needs: prioritize
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy

    strategy:
      fail-fast: false
      matrix:
        suite:
          - golden
          - api
          - perf
          - security
          - loop
          - visual

    steps:
      - uses: actions/checkout@v4

      - name: Install npm dependencies
        run: npm install

      - name: Map suite to spec file
        id: spec
        run: |
          case "${{ matrix.suite }}" in
            golden)   echo "file=tests/e2e/math-hub.spec.golden.ts"   >> $GITHUB_OUTPUT ;;
            api)      echo "file=tests/e2e/math-hub-api.spec.ts"      >> $GITHUB_OUTPUT ;;
            perf)     echo "file=tests/e2e/math-hub-perf.spec.ts"     >> $GITHUB_OUTPUT ;;
            security) echo "file=tests/e2e/math-hub-security.spec.ts" >> $GITHUB_OUTPUT ;;
            loop)     echo "file=tests/e2e/math-hub-loop.spec.ts"     >> $GITHUB_OUTPUT ;;
            visual)   echo "file=tests/e2e/math-hub-visual.spec.ts"   >> $GITHUB_OUTPUT ;;
          esac

      - name: Run ${{ matrix.suite }} suite
        run: |
          GREP_ARG=""
          if [ -n "${{ needs.prioritize.outputs.grep }}" ] && \
             [ "${{ needs.prioritize.outputs.full_run }}" = "false" ]; then
            GREP_ARG="--grep ${{ needs.prioritize.outputs.grep }}"
          fi
          npx playwright test \
            --config playwright.math-hub.config.ts \
            --project "Desktop Chrome" \
            --project "Mobile Chrome" \
            --workers 4 \
            --retries 1 \
            ${{ steps.spec.outputs.file }} \
            $GREP_ARG
        env:
          CI: true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.suite }}
          path: playwright-report-math-hub/
          retention-days: 14

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.suite }}
          path: test-results/
          retention-days: 7

  # ── Job 3: ShopNow Store — full E2E suite ─────────────────────────────────
  store-e2e:
    name: Store E2E — ${{ matrix.project }}
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy

    strategy:
      fail-fast: false
      matrix:
        project: ['Desktop Chrome', 'Mobile Chrome', 'Desktop Firefox', 'Mobile Safari']

    steps:
      - uses: actions/checkout@v4

      - name: Install npm dependencies
        run: npm install

      - name: Run Store suite (${{ matrix.project }})
        run: |
          npx playwright test \
            --config playwright.store.config.ts \
            --project "${{ matrix.project }}" \
            --workers 4 \
            --retries 1
        env:
          CI: true

      - name: Generate HTML report
        if: always()
        run: python scripts/generate_html_report.py || true

      - name: Upload Store report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: store-report-${{ matrix.project }}
          path: |
            store-qa-report.html
            test-results-store/results.json
            store-qa-history.json
          retention-days: 14

  # ── Job 4: Store smoke — fast pre-merge gate (Chrome only, @smoke tests) ───
  store-smoke:
    name: Store Smoke Gate
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Install npm dependencies
        run: npm install
      - name: Run @smoke tests
        run: |
          npx playwright test \
            --config playwright.store.config.ts \
            --project "Desktop Chrome" \
            --grep "@smoke" \
            --retries 0
        env:
          CI: true

  # ── Job 5: Security audit ──────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: npm audit (high+critical only)
        run: |
          npm install
          npm audit --audit-level=high || {
            echo "::warning::npm audit found high/critical vulnerabilities — see output above"
          }

      - name: pip-audit (Python dependencies)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format markdown >> $GITHUB_STEP_SUMMARY || {
            echo "::warning::pip-audit found vulnerabilities in Python dependencies"
          }

  # ── Job 6: Pipeline smoke test ─────────────────────────────────────────────
  pipeline-smoke:
    name: Pipeline Smoke (offline demo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run offline demo pipeline
        run: python -m orchestrator.pipeline --demo --offline

      - name: Run Python unit tests (incl. integration)
        run: python -m pytest tests/unit/ -q --tb=short

  # ── Job 7: Mutation test (scheduled weekly) ────────────────────────────────
  mutation-test:
    name: Mutation Testing (mutmut)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run mutmut
        run: mutmut run --no-progress || true

      - name: Show surviving mutants
        run: |
          mutmut results >> $GITHUB_STEP_SUMMARY
          mutmut junitxml > mutmut-results.xml || true

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-results
          path: mutmut-results.xml
          retention-days: 30

  # ── Job 8: CI summary ─────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [prioritize, playwright, store-smoke, pipeline-smoke, security-audit]
    if: always()
    steps:
      - name: Write job summary
        run: |
          echo "## QA Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY

          PW="${{ needs.playwright.result }}"
          SMOKE="${{ needs.pipeline-smoke.result }}"
          STORE="${{ needs.store-smoke.result }}"
          SEC="${{ needs.security-audit.result }}"

          [ "$PW" = "success" ] \
            && echo "| Playwright test pyramid | ✅ All suites passed |" >> $GITHUB_STEP_SUMMARY \
            || echo "| Playwright test pyramid | ❌ $PW |" >> $GITHUB_STEP_SUMMARY

          [ "$STORE" = "success" ] \
            && echo "| Store smoke gate | ✅ @smoke tests passed |" >> $GITHUB_STEP_SUMMARY \
            || echo "| Store smoke gate | ❌ $STORE |" >> $GITHUB_STEP_SUMMARY

          [ "$SMOKE" = "success" ] \
            && echo "| Pipeline smoke + unit tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY \
            || echo "| Pipeline smoke + unit tests | ❌ $SMOKE |" >> $GITHUB_STEP_SUMMARY

          [ "$SEC" = "success" ] \
            && echo "| Security audit | ✅ No high/critical vulnerabilities |" >> $GITHUB_STEP_SUMMARY \
            || echo "| Security audit | ⚠️ $SEC — check for vulnerabilities |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Suites:** golden E2E · API/HTTP · performance · security · endurance · visual" >> $GITHUB_STEP_SUMMARY
          echo "**Store suites:** visual · API · security · performance · endurance · a11y · CWV · resilience" >> $GITHUB_STEP_SUMMARY
          echo "**Browsers:** Desktop Chrome · Mobile Chrome · Desktop Firefox · Mobile Safari" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ needs.prioritize.outputs.grep }}" ]; then
            echo "**Prioritized grep:** \`${{ needs.prioritize.outputs.grep }}\`" >> $GITHUB_STEP_SUMMARY
          fi
