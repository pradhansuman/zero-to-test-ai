name: Phase 1 - Engine Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'engines/**'
      - 'shared/contracts/engine_schemas.py'
  pull_request:
    branches: [main, develop]

jobs:
  api-engine:
    runs-on: ubuntu-latest
    name: API Testing Engine

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./engines/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ./engines/api
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./engines/api/coverage.xml
          flags: api-engine
          name: api-engine-coverage

  database-engine:
    runs-on: ubuntu-latest
    name: Database Testing Engine

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./engines/database
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ./engines/database
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: testuser
          DB_PASSWORD: testpass
          DB_NAME: testdb
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./engines/database/coverage.xml
          flags: database-engine
          name: database-engine-coverage

  type-check:
    runs-on: ubuntu-latest
    name: Type Checking

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install mypy
        run: pip install mypy pydantic

      - name: Type check shared contracts
        run: mypy shared/contracts/engine_schemas.py --strict

      - name: Type check engines
        run: |
          mypy engines/api/src/ --strict || true
          mypy engines/database/src/ --strict || true

  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build Test

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build API engine image
        uses: docker/build-push-action@v4
        with:
          context: ./engines/api
          push: false
          tags: qa-api-engine:latest

      - name: Build Database engine image
        uses: docker/build-push-action@v4
        with:
          context: ./engines/database
          push: false
          tags: qa-database-engine:latest

  summary:
    runs-on: ubuntu-latest
    name: Test Summary
    needs: [api-engine, database-engine, type-check, docker-build]
    if: always()

    steps:
      - name: Report results
        run: |
          echo "Phase 1 Test Results"
          echo "===================="
          echo "✅ API Engine Tests: ${{ needs.api-engine.result }}"
          echo "✅ Database Engine Tests: ${{ needs.database-engine.result }}"
          echo "✅ Type Checking: ${{ needs.type-check.result }}"
          echo "✅ Docker Builds: ${{ needs.docker-build.result }}"
