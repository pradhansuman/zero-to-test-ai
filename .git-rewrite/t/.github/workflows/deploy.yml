name: Deploy to Kubernetes

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f infrastructure/kubernetes/postgres-statefulset.yaml
          kubectl apply -f infrastructure/kubernetes/redis-deployment.yaml
          kubectl apply -f infrastructure/kubernetes/backend-deployment.yaml
          kubectl apply -f infrastructure/kubernetes/celery-deployment.yaml
          kubectl apply -f infrastructure/kubernetes/ingress.yaml

      - name: Wait for backend rollout
        run: |
          kubectl rollout status deployment/qa-backend -n qa-automation --timeout=5m

      - name: Check deployment status
        run: |
          kubectl get deployments -n qa-automation
          kubectl get pods -n qa-automation
          kubectl get services -n qa-automation

      - name: Run smoke tests
        run: |
          BACKEND_URL=$(kubectl get service qa-backend -n qa-automation -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          if [ -z "$BACKEND_URL" ]; then
            BACKEND_URL="localhost:8000"
          fi
          curl -f http://$BACKEND_URL/health || exit 1

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Send deployment notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Deployment to Kubernetes ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
