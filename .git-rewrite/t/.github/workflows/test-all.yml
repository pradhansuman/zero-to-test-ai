name: QA Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-store:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          npm ci
          pip install -r requirements.txt

      - name: Install Playwright
        run: npx playwright install --with-deps chromium firefox

      - name: Run ShopNow test suite
        run: npm run test:store
        continue-on-error: true

      - name: Check pass rate
        run: |
          if [ ! -f test-results-store/results.json ]; then
            echo "❌ No test results found"
            exit 1
          fi
          PASSED=$(jq '.stats.expected' test-results-store/results.json)
          TOTAL=$(jq '.stats.total' test-results-store/results.json)
          RATE=$((PASSED * 100 / TOTAL))
          echo "Pass rate: $RATE% ($PASSED/$TOTAL)"
          if [ $RATE -lt 90 ]; then
            echo "❌ Pass rate below 90%"
            exit 1
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report-store
          path: playwright-report-store/

  test-demoapps:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci && npx playwright install --with-deps chromium
      - run: npm run test:demoapps
        continue-on-error: true
      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report-demoapps
          path: playwright-report-demoapps/

  gate:
    runs-on: ubuntu-latest
    needs: [test-store, test-demoapps]
    if: always()
    steps:
      - name: Check gate
        run: |
          if [ "${{ needs.test-store.result }}" != "success" ]; then
            echo "❌ Store tests failed"
            exit 1
          fi
          echo "✅ All tests passed"
