version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-engine-test:
    build:
      context: ./engines/api
      dockerfile: Dockerfile
    environment:
      PYTHONPATH: /app
    depends_on:
      - postgres
    command: pytest src/ -v --cov=src --cov-report=term-missing

  database-engine-test:
    build:
      context: ./engines/database
      dockerfile: Dockerfile
    environment:
      PYTHONPATH: /app
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: testuser
      DB_PASSWORD: testpass
      DB_NAME: testdb
    depends_on:
      postgres:
        condition: service_healthy
    command: pytest src/ -v --cov=src --cov-report=term-missing
