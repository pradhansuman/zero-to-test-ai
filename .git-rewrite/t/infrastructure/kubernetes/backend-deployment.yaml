apiVersion: v1
kind: Namespace
metadata:
  name: qa-automation

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: qa-automation
data:
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_HOURS: "24"
  CORS_ORIGINS: '["http://qa-api.example.com"]'

---

apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: qa-automation
type: Opaque
stringData:
  url: "postgresql+asyncpg://qa_user:qa_password@postgres:5432/qa_automation"
  username: "qa_user"
  password: "qa_password"
  database: "qa_automation"

---

apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: qa-automation
type: Opaque
stringData:
  JWT_SECRET: "your-secret-key-change-in-production"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: qa-backend
  namespace: qa-automation
spec:
  replicas: 3
  selector:
    matchLabels:
      app: qa-backend
  template:
    metadata:
      labels:
        app: qa-backend
    spec:
      containers:
      - name: backend
        image: qa-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: url
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: JWT_SECRET
        - name: JWT_ALGORITHM
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: JWT_ALGORITHM
        - name: JWT_EXPIRATION_HOURS
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: JWT_EXPIRATION_HOURS
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: CORS_ORIGINS
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

---

apiVersion: v1
kind: Service
metadata:
  name: qa-backend
  namespace: qa-automation
spec:
  type: ClusterIP
  selector:
    app: qa-backend
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
