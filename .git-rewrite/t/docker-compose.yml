version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: qa_platform_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qa_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qa_network

  redis:
    image: redis:7-alpine
    container_name: qa_platform_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qa_network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: qa_platform_api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/qa_platform
      REDIS_URL: redis://redis:6379/0
      API_HOST: 0.0.0.0
      API_PORT: 8000
      JWT_SECRET: test-secret-key-change-in-production
      LOG_LEVEL: INFO
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qa_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  qa_network:
    driver: bridge
